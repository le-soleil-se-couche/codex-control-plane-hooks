name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install --disable-pip-version-check ruff==0.15.12
      - name: Lint
        run: ruff check --no-cache .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
        python: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python }}
      - name: Protocol and release tests
        run: python -B -m unittest discover -s tests -v
      - name: Packaged Hook command smoke (POSIX)
        if: runner.os != 'Windows'
        run: python scripts/smoke_hook_manifest.py
      - name: Packaged Hook command smoke (PowerShell 7)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion.Major -ne 7) {
            throw "Expected PowerShell 7, found $($PSVersionTable.PSVersion)"
          }
          python scripts/smoke_hook_manifest.py --windows-shell pwsh
      - name: Packaged Hook command smoke (Windows PowerShell 5.1)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if ($PSVersionTable.PSVersion.Major -ne 5 -or $PSVersionTable.PSVersion.Minor -ne 1) {
            throw "Expected Windows PowerShell 5.1, found $($PSVersionTable.PSVersion)"
          }
          python scripts/smoke_hook_manifest.py --windows-shell powershell
      - name: Public release boundary
        run: python scripts/check_release.py

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan repository history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
