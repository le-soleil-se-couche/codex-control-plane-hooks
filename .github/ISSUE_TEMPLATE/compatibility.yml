name: Compatibility report
description: Report behavior on a specific Codex version or platform
title: "[compat] "
labels: [compatibility]
body:
  - type: input
    id: codex
    attributes:
      label: Codex version and surface
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS, architecture, and Python
    validations:
      required: true
  - type: textarea
    id: events
    attributes:
      label: Events exercised and redacted results
    validations:
      required: true
